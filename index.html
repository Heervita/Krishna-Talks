<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lord Krishna Talks</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&amp;family=Nunito:wght@300;400;500&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    .gradient-bg {
      background: linear-gradient(180deg, 
        #fef3e6 0%, 
        #fce8d5 12%, 
        #f9d5c2 24%, 
        #f5a97d 36%, 
        #f08d7a 48%, 
        #d97a8e 60%, 
        #b8608c 72%, 
        #8b4a7e 84%, 
        #5a3a6b 100%);
      position: relative;
      overflow: hidden;
    }
    
    .sunset-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 20%, rgba(255,200,100,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    
    .decorative-elements {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.8;
      display: none;
    }
    
    .message-krishna {
      background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(253,246,227,0.95) 100%);
      border-left: 3px solid #c9a87c;
    }
    
    .message-user {
      background: linear-gradient(135deg, rgba(212,150,126,0.2) 0%, rgba(201,168,124,0.25) 100%);
      border-right: 3px solid #d4967e;
    }
    
    .lotus-icon {
      filter: drop-shadow(0 2px 4px rgba(201,168,124,0.3));
    }
    
    .chat-container::-webkit-scrollbar {
      width: 6px;
    }
    
    .chat-container::-webkit-scrollbar-track {
      background: rgba(253,246,227,0.5);
      border-radius: 3px;
    }
    
    .chat-container::-webkit-scrollbar-thumb {
      background: rgba(201,168,124,0.5);
      border-radius: 3px;
    }
    
    .typing-dot {
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .fade-in-up {
      animation: fadeInUp 0.4s ease-out forwards;
    }
    
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(201,168,124,0.3);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full m-0 p-0">
  <div class="gradient-bg h-full w-full flex flex-col overflow-hidden">
   <!-- Sunset Overlay -->
   <div class="sunset-overlay"></div><!-- Decorative Elements -->
   <div class="decorative-elements">
    <!-- Basuri (Flute) -->
    <svg class="basuri" viewbox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
     <g transform="rotate(-20 60 20)">
      <!-- Flute body -->
      <rect x="10" y="15" width="100" height="10" rx="5" fill="#8b6f47" stroke="#6b5636" stroke-width="1" /> <!-- Flute holes -->
      <circle cx="25" cy="20" r="2.5" fill="#6b5636" opacity="0.7" />
      <circle cx="40" cy="20" r="2.5" fill="#6b5636" opacity="0.7" />
      <circle cx="55" cy="20" r="2.5" fill="#6b5636" opacity="0.7" />
      <circle cx="70" cy="20" r="2.5" fill="#6b5636" opacity="0.7" />
      <circle cx="85" cy="20" r="2.5" fill="#6b5636" opacity="0.7" /> <!-- Decorative bands -->
      <rect x="15" y="14" width="70" height="2" fill="#c9a87c" opacity="0.5" />
      <rect x="15" y="24" width="70" height="2" fill="#c9a87c" opacity="0.5" /> <!-- Glow effect -->
      <ellipse cx="60" cy="20" rx="45" ry="8" fill="#f5a97d" opacity="0.1" />
     </g>
    </svg><!-- Peacock Feather -->
    <svg class="peacock-feather" viewbox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
     <defs>
      <radialgradient id="eyeSpot" cx="50%" cy="50%" r="50%">
       <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
       <stop offset="60%" style="stop-color:#2e5c8a;stop-opacity:1" />
       <stop offset="100%" style="stop-color:#1a3a52;stop-opacity:1" />
      </radialgradient>
      <radialgradient id="featherGlow" cx="50%" cy="50%" r="50%">
       <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.8" />
       <stop offset="100%" style="stop-color:#27ae60;stop-opacity:0.3" />
      </radialgradient>
     </defs> <!-- Main feather shaft --> <path d="M 50 10 Q 45 40 48 60 Q 50 85 52 110" stroke="#3d2817" stroke-width="3" fill="none" stroke-linecap="round" /> <!-- Left feather vane --> <path d="M 48 20 Q 20 25 15 50 Q 10 70 20 90 Q 35 100 48 95" fill="url(#featherGlow)" opacity="0.9" /> <!-- Right feather vane --> <path d="M 52 20 Q 80 25 85 50 Q 90 70 80 90 Q 65 100 52 95" fill="url(#featherGlow)" opacity="0.9" /> <!-- Eye spot (peacock's defining feature) --> <circle cx="50" cy="45" r="12" fill="url(#eyeSpot)" /> <!-- Eye spot highlight --> <circle cx="50" cy="42" r="4" fill="#64b5f6" opacity="0.8" /> <!-- Inner ring --> <circle cx="50" cy="45" r="9" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.6" /> <!-- Gold accents --> <ellipse cx="50" cy="35" rx="8" ry="6" fill="#f5d547" opacity="0.4" />
    </svg>
   </div><!-- Header -->
   <header class="flex-shrink-0 text-center py-6 px-4">
    <div class="flex items-center justify-center gap-3 mb-2"><!-- Lotus SVG Icon -->
     <svg class="lotus-icon w-10 h-10" viewbox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="32" cy="48" rx="12" ry="4" fill="#c9a87c" opacity="0.3" /> <path d="M32 12C32 12 28 20 28 28C28 36 32 44 32 44C32 44 36 36 36 28C36 20 32 12 32 12Z" fill="#c9a87c" /> <path d="M32 44C32 44 24 38 20 32C16 26 16 18 16 18C16 18 22 22 28 28C34 34 32 44 32 44Z" fill="#d4967e" opacity="0.8" /> <path d="M32 44C32 44 40 38 44 32C48 26 48 18 48 18C48 18 42 22 36 28C30 34 32 44 32 44Z" fill="#d4967e" opacity="0.8" /> <path d="M32 44C32 44 18 40 12 36C6 32 4 24 4 24C4 24 14 28 24 32C34 36 32 44 32 44Z" fill="#e8b4a0" opacity="0.6" /> <path d="M32 44C32 44 46 40 52 36C58 32 60 24 60 24C60 24 50 28 40 32C30 36 32 44 32 44Z" fill="#e8b4a0" opacity="0.6" /> <circle cx="32" cy="28" r="3" fill="#fdf6e3" />
     </svg>
     <h1 id="main-title" class="text-3xl md:text-4xl font-semibold tracking-wide" style="font-family: 'Cormorant Garamond', serif; color: #8b5a3c;">Shree Krishna Talks</h1>
    </div>
    <p id="subtitle" class="text-sm md:text-base italic" style="font-family: 'Cormorant Garamond', serif; color: #a67c5b;">Seek wisdom, find peace</p>
   </header><!-- Chat Container -->
   <main class="flex-1 overflow-hidden px-4 pb-4">
    <div class="max-w-2xl mx-auto h-full flex flex-col bg-white/30 rounded-2xl backdrop-blur-sm shadow-lg border border-white/50"><!-- Messages Area -->
     <div id="chat-messages" class="chat-container flex-1 overflow-y-auto p-4 space-y-4"><!-- Welcome Message -->
      <div class="message-krishna rounded-xl p-4 max-w-[85%] fade-in-up">
       <div class="flex items-start gap-3">
        <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, #c9a87c 0%, #d4967e 100%);"><span class="text-white text-sm">🙏</span>
        </div>
        <div>
         <p class="text-xs mb-1 font-medium" style="color: #a67c5b; font-family: 'Nunito', sans-serif;">Krishna</p>
         <p id="welcome-text" class="text-sm md:text-base leading-relaxed" style="color: #5a4a3a; font-family: 'Nunito', sans-serif;">Hello, My dear Vids. What weighs upon your heart today? Ask me anything about life, purpose, duty, or inner peace.</p>
        </div>
       </div>
      </div>
     </div><!-- Typing Indicator (hidden by default) -->
     <div id="typing-indicator" class="hidden px-4 pb-2">
      <div class="message-krishna rounded-xl p-3 max-w-[100px]">
       <div class="flex items-center gap-1">
        <div class="typing-dot w-2 h-2 rounded-full" style="background: #c9a87c;"></div>
        <div class="typing-dot w-2 h-2 rounded-full" style="background: #c9a87c;"></div>
        <div class="typing-dot w-2 h-2 rounded-full" style="background: #c9a87c;"></div>
       </div>
      </div>
     </div><!-- Input Area -->
     <div class="flex-shrink-0 p-4 border-t border-white/30">
      <form id="chat-form" class="flex gap-3"><input type="text" id="user-input" placeholder="Share your thoughts..." class="input-glow flex-1 px-4 py-3 rounded-xl border-none outline-none text-sm md:text-base transition-all duration-300" style="background: rgba(255,255,255,0.8); color: #5a4a3a; font-family: 'Nunito', sans-serif;" autocomplete="off"> <button type="submit" class="px-5 py-3 rounded-xl font-medium text-white transition-all duration-300 hover:scale-105 hover:shadow-md active:scale-95" style="background: linear-gradient(135deg, #c9a87c 0%, #d4967e 100%); font-family: 'Nunito', sans-serif;"> <span class="hidden sm:inline">Send</span> <span class="sm:hidden">→</span> </button>
      </form>
     </div>
    </div>
   </main><!-- Footer -->
   <footer class="flex-shrink-0 text-center py-3 px-4">
    <p class="text-xs" style="color: #a67c5b; font-family: 'Nunito', sans-serif;">आपूर्यमाणमचलप्रतिष्ठं
समुद्रमाप: प्रविशन्ति यद्वत् |
तद्वत्कामा यं प्रविशन्ति सर्वे
स शान्तिमाप्नोति न कामकामी || ७० ||</p>
   </footer>
  </div>
  <script>
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing-indicator');

    // 1. Unified Message Display function
    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `${isUser ? 'message-user ml-auto' : 'message-krishna'} rounded-xl p-4 max-w-[85%] fade-in-up`;
        
        const senderName = isUser ? 'Vids' : 'Krishna';
        const icon = isUser ? '🦋' : '🦚';
        const align = isUser ? 'justify-end' : 'justify-start';
        const textAlign = isUser ? 'text-right' : 'text-left';
        const bgColor = isUser ? 'linear-gradient(135deg, #d4967e 0%, #e8b4a0 100%)' : 'linear-gradient(135deg, #c9a87c 0%, #d4967e 100%)';

        messageDiv.innerHTML = `
            <div class="flex items-start gap-3 ${align}">
                ${!isUser ? `<div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center" style="background: ${bgColor}"><span class="text-white text-sm">${icon}</span></div>` : ''}
                <div>
                    <p class="text-xs mb-1 font-medium ${textAlign}" style="color: #a67c5b; font-family: 'Nunito', sans-serif;">${senderName}</p>
                    <p class="text-sm md:text-base leading-relaxed" style="color: #5a4a3a; font-family: 'Nunito', sans-serif;">${text}</p>
                </div>
                ${isUser ? `<div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center" style="background: ${bgColor}"><span class="text-white text-sm">${icon}</span></div>` : ''}
            </div>
        `;
        
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 2. The Final Unified Fetch Logic
    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        
        if (!text) return;

        addMessage(text, true); // Show Vids' message
        userInput.value = ''; // Clear input
        
        typingIndicator.classList.remove('hidden'); // Show typing
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const response = await fetch('http://127.0.0.1:8000/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text }) // Correctly sending the STRING text
            });

            const data = await response.json();
            typingIndicator.classList.add('hidden');

            if (data.response) {
                addMessage(data.response, false); // Match the backend key "response"
            } else {
                addMessage("Vids, the connection is flickering. Try again?", false);
            }
        } catch (error) {
            console.error("Error:", error);
            typingIndicator.classList.add('hidden');
            addMessage("Vids, I cannot hear you. Is the Python server running?", false);
        }
    });
</script>
 </body>
</html>
